name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1 # <-- Chìa khóa đây: Chỉ tải code hiện tại, vứt bỏ toàn bộ lịch sử cũ
          lfs: false
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Lệnh ép in file README.md chuẩn 100% ngay tại chỗ
          echo "---" > README.md
          echo "title: Paper Search API" >> README.md
          echo "emoji: 🚀" >> README.md
          echo "colorFrom: blue" >> README.md
          echo "colorTo: green" >> README.md
          echo "sdk: docker" >> README.md
          echo "pinned: false" >> README.md
          echo "---" >> README.md
          
          # 2. Dọn rác quá khứ
          rm -rf .git
          
          # 3. Đóng gói và ép đẩy đi
          git init
          git branch -M main
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Force deploy with generated README"
          
          # Nhớ thay lại link của bạn ở dòng dưới này nha
          git push --force https://nguyenhoangynhi:${HF_TOKEN}@huggingface.co/spaces/nguyenhoangynhi/paper-search-api main
