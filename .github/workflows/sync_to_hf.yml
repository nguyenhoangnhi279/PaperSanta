name: Sync to Hugging Face Space
on:
  push:
    branches: [main] # Sửa thành master nếu nhánh chính của bạn tên là master
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://nguyenhoangnhi:$HF_TOKEN@huggingface.co/spaces/nguyenhoangynhi/paper-search-api main
