name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1 # <-- Chìa khóa đây: Chỉ tải code hiện tại, vứt bỏ toàn bộ lịch sử cũ
          lfs: false
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Xóa sạch dấu vết git cũ
          rm -rf .git
          
          # 2. Tạo một lịch sử git hoàn toàn mới chỉ chứa code sạch
          git init
          git branch -M main
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Deploy clean code to Hugging Face"
          
          # 3. Đẩy mạnh sang Hugging Face (Nhớ sửa link này lại bằng thông tin thật của bạn nha)
          git push --force https://nguyenhoangnhi:${HF_TOKEN}@huggingface.co/spaces/nguyenhoangynhi/paper-search-api main
